version: '3.8'

services:
  mga-inference-dev:
    build:
      context: ..
      dockerfile: serve/Dockerfile
    image: mga-inference:latest
    container_name: mga-inference-dev
    volumes:
      - ..:/app
    working_dir: /app
    command: /bin/bash
    stdin_open: true
    tty: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - DGLBACKEND=pytorch
      - PATH=/opt/conda/envs/ADMET_v2/bin:$PATH
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility

